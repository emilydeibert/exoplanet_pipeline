# Staged HRCCS Fe config with free T-P pressure points, beta, and CIA continuum.

target:
  name: MASCARA-1b

prt:
  input_data_path: /home/edeibert/projects/def-ldang05/edeibert/petitRADTRANS/input_data
  input_data_env_var: PETITRADTRANS_INPUT_DATA
  require_input_data_path: true

planet:
  planet_radius_rj: 1.5
  star_radius_rsun: 2.1
  reference_gravity_cgs: 4.1e3
  reference_pressure_bar: 1.0e-2

pressure_grid:
  min_bar: 1.0e-6
  max_bar: 1.0e2
  n_layers: 100

tp_profile:
  type: free_two_point_inversion
  min_delta_logP: 0.25
  T_upper_bounds: [1000.0, 7000.0]

species:
  active_species: [Fe]
  Fe:
    prt_name: Fe
    abundance_parameter: log10_Fe
  filling_gas:
    H2_weight: 0.74
    He_weight: 0.24
  mean_molar_mass: 2.33

continuum_contributors:
  - H2-H2
  - H2-He

continuum:
  rayleigh_species: []
  hminus:
    # Keep H- off in this staged config. Enable only after confirming local pRT
    # input_data contains the required H- continuum support.
    enabled: false
    fixed_mass_fractions:
      H-: 1.0e-10
      H: 1.0e-4
      e-: 1.0e-4

model:
  mode: emission
  representation: xcorr_processed
  line_opacity_mode: lbl
  line_by_line_opacity_sampling: 4
  wavelength_boundaries_micron: [0.383, 1.0]
  wavelength_margin_fraction: 0.01
  xcorr_processed:
    stellar_temperature: 9360.0
    stellar_radius_rsun: 1.67
    vacuum_to_air: auto
    remove_envelope: true
    envelope_pixels: 400
    envelope_poly_order: 4

priors:
  Kp: [185.0, 210.0]
  Vsys: [-12.0, 8.0]
  T_deep: [1000.0, 3500.0]
  delta_T_inv: [0.0, 5000.0]
  logP_deep: [-2.0, 2.0]
  logP_upper: [-6.0, -2.0]
  log10_Fe: [-7.5, -2.0]
  log_beta: [-1.0, 1.0]
  log_model_scale: [-4.0, 4.0]
  allow_negative_delta_T_inv_validation: false

initial_parameters:
  Kp: 198.0
  Vsys: -2.0
  T_deep: 2200.0
  delta_T_inv: 2500.0
  logP_deep: -1.0
  logP_upper: -4.0
  log10_Fe: -4.5
  log_beta: 0.0
  log_model_scale: 0.0

sampler:
  sampled_parameters:
    - Kp
    - Vsys
    - T_deep
    - delta_T_inv
    - logP_deep
    - logP_upper
    - log10_Fe
    - log_beta
